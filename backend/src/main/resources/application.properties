spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:kanban_db}
spring.datasource.username=${DB_USER:${POSTGRES_USER:postgres}}
spring.datasource.password=${DB_PASSWORD:${POSTGRES_PASSWORD:password}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
server.port=8080

# Flyway DB migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# When upgrading an existing database, allow Flyway to baseline on first migrate
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
